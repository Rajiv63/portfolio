<nav class="navbar" [class.scrolled]="isScrolled">
  <div class="container">
    <div class="navbar-inner">
      <!-- Logo -->
      <a routerLink="/" class="logo" (click)="closeMobileMenu()">
        <div class="logo-text">
          <span class="logo-name">Rajiv Shukla</span>
          <span class="logo-role">Angular Developer</span>
        </div>
      </a>

      <!-- Desktop Nav Links -->
      <ul class="nav-links desktop-only">
        @for (link of navLinks; track link.path) {
          <li>
            <a
              [routerLink]="link.path"
              routerLinkActive="active"
              [routerLinkActiveOptions]="{ exact: link.path === '/' }"
              class="nav-link"
            >
              {{ link.label }}
            </a>
          </li>
        }
      </ul>

      <!-- Desktop CTA -->
      <div class="navbar-cta desktop-only">
        <a
          href="assets/resume/Rajiv_Shukla_Resume.pdf"
          download
          class="btn btn-primary"
        >
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
            <polyline points="7 10 12 15 17 10" />
            <line x1="12" y1="15" x2="12" y2="3" />
          </svg>
          Resume
        </a>
      </div>

      <!-- Mobile Hamburger -->
      <button
        class="hamburger mobile-only"
        [class.open]="isMobileMenuOpen"
        (click)="toggleMobileMenu()"
        aria-label="Toggle menu"
      >
        <span></span>
        <span></span>
        <span></span>
      </button>
    </div>
  </div>

  <!-- Mobile Menu -->
  <div class="mobile-menu" [class.open]="isMobileMenuOpen">
    <ul>
      @for (link of navLinks; track link.path) {
        <li>
          <a
            [routerLink]="link.path"
            routerLinkActive="active"
            [routerLinkActiveOptions]="{ exact: link.path === '/' }"
            (click)="closeMobileMenu()"
          >
            {{ link.label }}
          </a>
        </li>
      }
      <li class="mobile-cta">
        <a
          href="assets/resume/Rajiv_Shukla_Resume.pdf"
          download
          class="btn btn-primary"
          (click)="closeMobileMenu()"
        >
          Download Resume
        </a>
      </li>
    </ul>
  </div>
</nav>

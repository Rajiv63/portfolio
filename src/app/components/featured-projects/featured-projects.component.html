<section class="projects-section">
  <div class="section-header">
    <span class="eyebrow">
      <span class="eyebrow-dot"></span>
      Portfolio
    </span>
    <h2>Featured Projects</h2>
    <p>
      Real-world applications built with Angular &amp; modern web technologies
    </p>
  </div>

  <div class="stack-stage">
    @for (project of projects; track project.slug; let i = $index) {
      <app-project-card
        [project]="project"
        [index]="i"
        [delay]="i * 100"
        [style.z-index]="i + 1"
      ></app-project-card>
    }
  </div>
</section>
